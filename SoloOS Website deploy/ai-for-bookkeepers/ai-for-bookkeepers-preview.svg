<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">AI for Bookkeepers product preview</title>
  <desc id="desc">Preview graphic for the AI for Bookkeepers guide showing prompt cards, privacy rules, and a monthly close checklist.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#111d37"/>
      <stop offset="55%" stop-color="#1b2a4e"/>
      <stop offset="100%" stop-color="#365c45"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#000000" flood-opacity=".28"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="110" r="190" fill="#c99b3f" opacity=".12"/>
  <circle cx="140" cy="640" r="230" fill="#c99b3f" opacity=".09"/>
  <text x="82" y="92" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" letter-spacing="3" fill="#c99b3f">PLAIN-ENGLISH AI KIT</text>
  <text x="82" y="166" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#fffaf1">AI for Bookkeepers</text>
  <text x="86" y="212" font-family="Inter, Arial, sans-serif" font-size="28" fill="#d8c8aa">Your judgment is still the product.</text>
  <text x="86" y="266" font-family="Inter, Arial, sans-serif" font-size="23" fill="#ffffff" opacity=".78">Client emails. Cleanup checklists. Report explanations.</text>
  <text x="86" y="302" font-family="Inter, Arial, sans-serif" font-size="23" fill="#ffffff" opacity=".78">Monthly close notes. SOPs. Privacy-first prompts.</text>

  <g filter="url(#shadow)">
    <rect x="710" y="86" width="454" height="548" rx="28" fill="#fffaf1"/>
    <rect x="744" y="124" width="386" height="70" rx="14" fill="#1b2a4e"/>
    <text x="768" y="154" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#c99b3f">PROMPT LIBRARY</text>
    <text x="768" y="177" font-family="Inter, Arial, sans-serif" font-size="17" fill="#fffaf1">Copy, paste, edit like a pro.</text>

    <rect x="744" y="222" width="386" height="92" rx="16" fill="#ffffff" stroke="#e5dccb"/>
    <text x="770" y="252" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#1b2a4e">Missing Items Email</text>
    <text x="770" y="282" font-family="Inter, Arial, sans-serif" font-size="15" fill="#5e6573">Ask for receipts without sounding like</text>
    <text x="770" y="304" font-family="Inter, Arial, sans-serif" font-size="15" fill="#5e6573">the villain in a paperwork drama.</text>

    <rect x="744" y="334" width="386" height="92" rx="16" fill="#ffffff" stroke="#e5dccb"/>
    <text x="770" y="364" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#1b2a4e">Cleanup Checklist</text>
    <text x="770" y="394" font-family="Inter, Arial, sans-serif" font-size="15" fill="#5e6573">Turn messy notes into bank, card, sales,</text>
    <text x="770" y="416" font-family="Inter, Arial, sans-serif" font-size="15" fill="#5e6573">payroll, and client-question steps.</text>

    <rect x="744" y="446" width="386" height="112" rx="16" fill="#ffffff" stroke="#e5dccb"/>
    <text x="770" y="476" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#1b2a4e">Privacy Rule</text>
    <text x="770" y="506" font-family="Inter, Arial, sans-serif" font-size="15" fill="#5e6573">If you would not paste it into a public</text>
    <text x="770" y="528" font-family="Inter, Arial, sans-serif" font-size="15" fill="#5e6573">forum, do not paste it into public AI.</text>
  </g>

  <g>
    <rect x="86" y="386" width="186" height="96" rx="18" fill="#fffaf1" opacity=".96"/>
    <text x="112" y="426" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#1b2a4e">One-hour setup</text>
    <text x="112" y="456" font-family="Inter, Arial, sans-serif" font-size="15" fill="#5e6573">Use it today.</text>
    <rect x="294" y="386" width="186" height="96" rx="18" fill="#fffaf1" opacity=".96"/>
    <text x="320" y="426" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#1b2a4e">Fake examples</text>
    <text x="320" y="456" font-family="Inter, Arial, sans-serif" font-size="15" fill="#5e6573">No client data.</text>
    <rect x="502" y="386" width="160" height="96" rx="18" fill="#c99b3f"/>
    <text x="532" y="426" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#1b2a4e">$47</text>
    <text x="532" y="456" font-family="Inter, Arial, sans-serif" font-size="15" fill="#1b2a4e">Digital guide</text>
  </g>
</svg>
