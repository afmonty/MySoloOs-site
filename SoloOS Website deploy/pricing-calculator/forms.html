<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex">
  <title>SoloOS Pricing Calculator Form</title>
</head>
<body>
  <form name="pricing-calc-capture" method="POST" action="/" data-netlify="true" netlify-honeypot="bot-field">
    <input type="hidden" name="form-name" value="pricing-calc-capture">
    <input type="hidden" name="source" value="pricing-calculator">
    <input type="text" name="bot-field">
    <input type="hidden" name="hourly_rate">
    <input type="hidden" name="annual_revenue">
    <input type="text" name="name">
    <input type="email" name="email">
    <button type="submit">Submit</button>
  </form>
</body>
</html>
