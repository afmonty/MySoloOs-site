name: Switch calculator email captures to Kit
on:
  push:
    paths:
      - '.github/workflows/switch-calculator-captures-to-kit.yml'
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update calculator capture forms
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          pages = [
            {
              'path': Path('SoloOS Website deploy/pricing-calculator/index.html'),
              'name': 'pricing-calc-capture',
              'iframe': 'kit-pricing-hidden',
              'success': 'formSuccess',
              'error': 'formError',
            },
            {
              'path': Path('SoloOS Website deploy/etsy-fee-calculator/index.html'),
              'name': 'etsy-calc-capture',
              'iframe': 'kit-etsy-hidden',
              'success': 'form-success',
              'error': 'form-error',
            },
          ]

          for page in pages:
            path = page['path']
            text = path.read_text(encoding='utf-8')

            form_re = re.compile(r'<form class="email-form" name="' + re.escape(page['name']) + r'"[^>]*>')
            form_html = (
              f'<iframe name="{page["iframe"]}" style="display:none" aria-hidden="true"></iframe>\n'
              f'        <form class="email-form" name="{page["name"]}" '
              f'action="https://app.kit.com/forms/9519803/subscriptions" method="post" '
              f'target="{page["iframe"]}" onsubmit="handleFormSubmit(event)">'
            )
            text, count = form_re.subn(form_html, text, count=1)
            if count != 1:
              raise RuntimeError(f'Could not replace form in {path}')

            text = text.replace('name="name"', 'name="fields[first_name]"', 1)
            text = text.replace('name="email"', 'name="email_address"', 1)

            handler_re = re.compile(r'  function handleFormSubmit\(e\) \{.*?\n  \}\n', re.S)
            handler = f'''  function handleFormSubmit(e) {{
    const form = e.target;
    const btn = form.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Sending...';
    document.getElementById('{page['error']}').style.display = 'none';
    setTimeout(() => {{
      form.style.display = 'none';
      document.getElementById('{page['success']}').style.display = 'block';
    }}, 1500);
  }}
'''
            text, count = handler_re.subn(handler, text, count=1)
            if count != 1:
              raise RuntimeError(f'Could not replace submit handler in {path}')

            path.write_text(text, encoding='utf-8')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add 'SoloOS Website deploy/pricing-calculator/index.html' 'SoloOS Website deploy/etsy-fee-calculator/index.html'
          git commit -m 'Fix calculator email captures with Kit'
          git push
