name: Switch calculator email captures to Kit
on:
  push:
    paths:
      - '.github/workflows/switch-calculator-captures-to-kit.yml'
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update calculator capture forms
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          pages = [
            ('SoloOS Website deploy/pricing-calculator/index.html', 'pricing-calc-capture', 'kit-pricing-hidden', 'formSuccess', 'formError'),
            ('SoloOS Website deploy/etsy-fee-calculator/index.html', 'etsy-calc-capture', 'kit-etsy-hidden', 'form-success', 'form-error'),
          ]

          for filename, form_name, iframe, success, error in pages:
            path = Path(filename)
            text = path.read_text(encoding='utf-8')
            form_re = re.compile(r'<form class="email-form" name="' + re.escape(form_name) + r'"[^>]*>')
            form_html = '<iframe name="' + iframe + '" style="display:none" aria-hidden="true"></iframe>\n        <form class="email-form" name="' + form_name + '" action="https://app.kit.com/forms/9519803/subscriptions" method="post" target="' + iframe + '" onsubmit="handleFormSubmit(event)">'
            text, count = form_re.subn(form_html, text, count=1)
            if count != 1:
              raise RuntimeError('Could not replace form in ' + filename)

            text = text.replace('name="name"', 'name="fields[first_name]"', 1)
            text = text.replace('name="email"', 'name="email_address"', 1)

            handler_re = re.compile(r'  function handleFormSubmit\(e\) \{.*?\n  \}\n', re.S)
            handler = '  function handleFormSubmit(e) {\n    const form = e.target;\n    const btn = form.querySelector(\'button[type="submit"]\');\n    btn.disabled = true;\n    btn.textContent = \'Sending...\';\n    document.getElementById(\'' + error + '\').style.display = \'none\';\n    setTimeout(() => {\n      form.style.display = \'none\';\n      document.getElementById(\'' + success + '\').style.display = \'block\';\n    }, 1500);\n  }\n'
            text, count = handler_re.subn(handler, text, count=1)
            if count != 1:
              raise RuntimeError('Could not replace submit handler in ' + filename)
            path.write_text(text, encoding='utf-8')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add 'SoloOS Website deploy/pricing-calculator/index.html' 'SoloOS Website deploy/etsy-fee-calculator/index.html'
          git commit -m 'Fix calculator email captures with Kit'
          git push
