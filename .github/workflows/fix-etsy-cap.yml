name: Finalize Etsy capped reverse pricing
on:
  push:
    paths:
      - '.github/workflows/fix-etsy-cap.yml'
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('SoloOS Website deploy/etsy-fee-calculator/index.html')
          s = p.read_text(encoding='utf-8')
          old = "    // Reverse: target = total*(1 - TX - PP - ads) - PPFL - LST\n    // total = (target + PPFL + LST) / (1 - TX - PP - ads)\n    const denominator = 1 - TX - PP - ads;\n    const total    = denominator > 0 ? (target + PPFL + LST) / denominator : 0;"
          new = "    // Calculate the uncapped result first, then switch to the capped formula\n    // when that result would exceed Etsy's $100 Offsite Ads fee cap.\n    const denominator = 1 - TX - PP - ads;\n    const uncappedTotal = denominator > 0 ? (target + PPFL + LST) / denominator : 0;\n    const adsWouldBeCapped = withAds && uncappedTotal * ads > ADS_CAP;\n    const total = adsWouldBeCapped\n      ? (target + PPFL + LST + ADS_CAP) / (1 - TX - PP)\n      : uncappedTotal;"
          if old not in s:
              raise SystemExit('Expected reverse-pricing block not found')
          p.write_text(s.replace(old, new), encoding='utf-8')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add 'SoloOS Website deploy/etsy-fee-calculator/index.html'
          git commit -m 'Fix Etsy capped reverse pricing'
          git push
